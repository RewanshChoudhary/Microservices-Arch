spring:
  datasource:
    url: ${QA_DB_URL}
    username: ${QA_DB_USER}
    password: ${QA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never

api:
  version: "1"

Bank-Address:
  add1: "Delhi"
