services:
  postgres:
    image: postgres:16
    container_name: microservice
    environment:
      POSTGRES_USER: rewansh
      POSTGRES_PASSWORD: rootrewansh
      POSTGRES_DB: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewansh -d localdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  loans:
    image: rc/loans:s4
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy # Wait for the healthcheck to pass before starting
  accounts:
    image: rc/accounts:s4
    ports:
      - "8080:8080"
    DB_URL: ${DB_URL}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
volumes:
  postgres_data: {} # Fixed missing definition
